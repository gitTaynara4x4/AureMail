<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AureMail | Caixa de Entrada</title>
  <meta name="description" content="AureMail webmail profissional." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
    (() => {
      const savedTheme = localStorage.getItem("auremail-theme");
      if (savedTheme === "dark") {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>

  <link rel="stylesheet" href="./assets/css/global.css" />
  <link rel="stylesheet" href="./assets/css/mail.css" />
</head>
<body>
  <div class="mail-layout">
    <aside id="sidebarMount" class="am-sidebar-mount"></aside>

    <div class="mail-main">
      <header class="mail-topbar">
        <div class="mail-topbar__left">
          <h1>Webmail AureMail</h1>
          <p id="currentContextInfo">Carregando contexto da empresa...</p>
        </div>

        <div class="mail-topbar__right">
          <div class="search-box">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" id="mailSearch" placeholder="Buscar e-mails, pessoas ou assuntos" />
          </div>

          <button class="btn btn-primary" type="button" id="openComposeBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Novo e-mail
          </button>
          
          <button class="btn btn-icon" type="button" id="refreshBtn" title="Atualizar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 1 0 2.1-5.9L3 8"/><path d="M3 2v6h6"/></svg>
          </button>
          
          <button class="btn btn-icon danger" type="button" id="logoutBtn" title="Sair do Webmail">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </header>

      <div class="mail-toolbar">
        <div class="mail-context-row">
          <div class="select-wrapper">
            <select id="domainSelect" class="mail-context-select">
              <option value="">Carregando domínios...</option>
            </select>
            <svg class="select-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
          </div>

          <div class="select-wrapper">
            <select id="mailboxSelect" class="mail-context-select">
              <option value="">Carregando caixas...</option>
            </select>
            <svg class="select-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
          </div>
        </div>

        <nav class="mail-nav">
          <a href="#" class="mail-nav__item active" data-folder="inbox">
            <div class="nav-label">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
              <span>Entrada</span>
            </div>
            <strong>0</strong>
          </a>

          <a href="#" class="mail-nav__item" data-folder="sent">
            <div class="nav-label">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              <span>Enviados</span>
            </div>
            <strong>0</strong>
          </a>

          <a href="#" class="mail-nav__item" data-folder="drafts">
            <div class="nav-label">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
              <span>Rascunhos</span>
            </div>
            <strong>0</strong>
          </a>

          <a href="#" class="mail-nav__item" data-folder="trash">
            <div class="nav-label">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              <span>Lixeira</span>
            </div>
            <strong>0</strong>
          </a>
        </nav>
      </div>
      
      <div class="mail-feedback" id="mailFeedback"></div>

      <section class="mail-content">
        <div class="mail-panel list-panel">
          <div class="panel-head">
            <strong>Mensagens</strong>
            <span class="badge" id="mailResultsCount">0 resultados</span>
          </div>

          <div class="mail-list" id="mailList">
            <div class="mail-empty-state">Carregando mensagens...</div>
          </div>
        </div>

        <div class="mail-panel view-panel">
          <div class="panel-head panel-head--view">
            <div>
              <strong id="mailViewSubtitle">Mensagem selecionada</strong>
            </div>

            <div class="mail-actions">
              <button class="btn btn-secondary" type="button" id="replyBtn" title="Responder">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>
                Responder
              </button>
              <button class="btn btn-secondary" type="button" id="forwardBtn" title="Encaminhar">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 17 20 12 15 7"/><path d="M4 18v-2a4 4 0 0 1 4-4h12"/></svg>
                Encaminhar
              </button>
              <button class="btn btn-icon danger" type="button" id="archiveBtn" title="Mover p/ lixeira">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </button>
            </div>
          </div>

          <article class="mail-view" id="mailView">
            <div class="mail-empty-state">
              Selecione uma mensagem para visualizar o conteúdo.
            </div>
          </article>
        </div>
      </section>
    </div>
  </div>

  <div class="compose-overlay" id="composeOverlay"></div>

  <section class="compose-modal" id="composeModal" aria-hidden="true">
    <div class="compose-modal__head">
      <strong>Novo E-mail</strong>
      <button type="button" class="btn-icon" id="closeComposeBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <form class="compose-form" id="composeForm">
      <div class="field">
        <label for="from">De</label>
        <input type="text" id="from" value="" readonly />
      </div>

      <div class="field">
        <label for="to">Para</label>
        <input type="email" id="to" placeholder="destinatario@dominio.com" required />
      </div>

      <div class="field">
        <label for="subject">Assunto</label>
        <input type="text" id="subject" placeholder="Digite o assunto do e-mail" />
      </div>

      <div class="field compose-field--grow">
        <label for="message">Mensagem</label>
        <textarea id="message" placeholder="Escreva sua mensagem.."></textarea>
      </div>

      <div class="compose-actions">
        <button type="button" class="btn btn-secondary" id="draftBtn">Salvar rascunho</button>
        <button type="submit" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Enviar Mensagem
        </button>
      </div>
    </form>
  </section>

  <script src="./assets/js/mail.js"></script>
</body>
</html>
