<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AureMail | Webmail</title>
  <meta name="description" content="AureMail webmail profissional." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script>
    (() => {
      const savedTheme = localStorage.getItem("auremail-theme");
      if (savedTheme === "dark") {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>

  <link rel="stylesheet" href="/assets/css/mail.css" />
</head>
<body>
  <div class="mail-layout">
    <header class="mail-topbar">
      <div class="mail-topbar__left">
        <button class="btn-icon menu-toggle-btn" id="menuToggleBtn" type="button" aria-label="Abrir menu">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>

        <img src="/assets/img/logo.png" alt="AureMail Logo" class="mail-logo" />
      </div>

      <div class="search-container">
        <div class="search-box">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.3-4.3"></path>
          </svg>
          <input type="text" id="mailSearch" placeholder="Pesquisar no e-mail" autocomplete="off" />
        </div>
      </div>

      <div class="mail-topbar__right">
        <button class="btn-icon" type="button" id="refreshBtn" title="Atualizar" aria-label="Atualizar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 2v6h-6"></path>
            <path d="M3 12a9 9 0 1 0 2.1-5.9L3 8"></path>
            <path d="M3 2v6h6"></path>
          </svg>
        </button>

        <button class="btn-icon danger" type="button" id="logoutBtn" title="Sair" aria-label="Sair">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </header>

    <div class="mail-body">
      <div class="sidebar-overlay" id="sidebarOverlay"></div>

      <aside class="mail-sidebar" id="mailSidebar">
        <div class="compose-btn-wrapper">
          <button class="btn-compose" type="button" id="openComposeBtn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14"></path>
            </svg>
            Escrever
          </button>
        </div>

        <nav class="mail-nav" id="mailNav" aria-label="Pastas do e-mail"></nav>

        <div class="mail-nav-section">
          <div class="mail-nav-section__title">Marcadores</div>
          <div id="mailLabelsList" class="mail-labels-list">
            <div class="mail-label-empty">Nenhum marcador personalizado</div>
          </div>
        </div>

        <div class="mail-context-area mail-context-row">
          <span class="context-label" id="currentContextInfo">Contexto</span>

          <select id="domainSelect" class="mail-context-select">
            <option value="">Domínios...</option>
          </select>

          <select id="mailboxSelect" class="mail-context-select">
            <option value="">Caixas...</option>
          </select>
        </div>
      </aside>

      <section class="mail-content list-mode" id="mailContent">
        <div class="mail-panel list-panel">
          <div class="panel-head panel-head--list gmail-list-head">
            <div class="panel-head__left gmail-list-head__left">
              <div class="gmail-toolbar-group">
                <label class="selection-master selection-master--dropdown" for="selectAllCheckbox" title="Selecionar">
                  <input type="checkbox" id="selectAllCheckbox" />
                  <span class="selection-master__arrow">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                      <path d="M7 10l5 5 5-5z"></path>
                    </svg>
                  </span>
                </label>

                <button class="btn-icon btn-icon--sm" type="button" id="refreshListBtn" title="Atualizar lista" aria-label="Atualizar lista">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 2v6h-6"></path>
                    <path d="M3 12a9 9 0 1 0 2.1-5.9L3 8"></path>
                    <path d="M3 2v6h6"></path>
                  </svg>
                </button>

                <button class="btn-icon btn-icon--sm" type="button" id="listMoreBtn" title="Mais" aria-label="Mais">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <circle cx="12" cy="5" r="1.7"></circle>
                    <circle cx="12" cy="12" r="1.7"></circle>
                    <circle cx="12" cy="19" r="1.7"></circle>
                  </svg>
                </button>
              </div>
            </div>

            <div class="panel-head__right gmail-list-head__right">
              <span class="selected-count" id="selectedCountLabel">0 selecionados</span>

              <button class="btn btn-secondary btn-xs" type="button" id="clearSelectionBtn" style="display:none;">
                Limpar
              </button>

              <div class="gmail-pager">
                <span class="gmail-pager__status" id="mailPageStatus">0 de 0</span>

                <button class="btn-icon btn-icon--sm" type="button" id="prevPageBtn" aria-label="Anterior" title="Anterior">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                  </svg>
                </button>

                <button class="btn-icon btn-icon--sm" type="button" id="nextPageBtn" aria-label="Próximo" title="Próximo">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6"></polyline>
                  </svg>
                </button>

                <button class="btn-icon btn-icon--sm" type="button" id="densityBtn" aria-label="Visualização" title="Visualização">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <rect x="4" y="6" width="16" height="2" rx="1"></rect>
                    <rect x="4" y="11" width="16" height="2" rx="1"></rect>
                    <rect x="4" y="16" width="16" height="2" rx="1"></rect>
                  </svg>
                </button>
              </div>
            </div>
          </div>

          <div class="mail-category-tabs" id="mailCategoryTabs"></div>

          <div class="mail-list-toolbar">
            <span id="mailResultsCount">0 conversas</span>
          </div>

          <div class="mail-list" id="mailList">
            <div class="mail-empty-state">
              <span>Carregando mensagens...</span>
            </div>
          </div>
        </div>

        <div class="mail-panel view-panel">
          <div class="panel-head panel-head--view">
            <div class="mail-actions">
              <button class="btn-icon" type="button" id="detailBackBtn" title="Voltar" aria-label="Voltar" style="display:none;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="19" y1="12" x2="5" y2="12"></line>
                  <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
              </button>

              <button class="btn-icon" type="button" id="spamBtn" title="Spam" aria-label="Spam">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="9"></circle>
                  <line x1="8" y1="8" x2="16" y2="16"></line>
                </svg>
              </button>

              <button class="btn-icon" type="button" id="restoreInboxBtn" title="Mover para entrada" aria-label="Mover para entrada" style="display:none;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"></polyline>
                  <path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path>
                </svg>
              </button>

              <button class="btn-icon" type="button" id="archiveBtn" title="Mover para lixeira" aria-label="Mover para lixeira">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"></polyline>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
              </button>

              <span class="toolbar-divider"></span>

              <button class="btn-icon" type="button" id="starToggleBtn" title="Com estrela" aria-label="Com estrela">
                <span class="btn-star">★</span>
              </button>

              <button class="btn-icon" type="button" id="importantToggleBtn" title="Importante" aria-label="Importante">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 3l2.7 5.47 6.03.88-4.36 4.25 1.03 6.01L12 16.77l-5.4 2.84 1.03-6.01L3.27 9.35l6.03-.88L12 3z"></path>
                </svg>
              </button>

              <button class="btn-icon" type="button" id="snoozeBtn" title="Adiar" aria-label="Adiar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="9"></circle>
                  <polyline points="12 7 12 12 15 15"></polyline>
                </svg>
              </button>

              <button class="btn-icon" type="button" id="unsnoozeBtn" title="Remover adiamento" aria-label="Remover adiamento" style="display:none;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 12a9 9 0 1 0 2.1-5.9L3 8"></path>
                  <path d="M3 3v5h5"></path>
                </svg>
              </button>
            </div>

            <div class="mail-actions">
              <button class="btn-icon" type="button" id="replyBtn" title="Responder" aria-label="Responder">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="9 17 4 12 9 7"></polyline>
                  <path d="M20 18v-2a4 4 0 0 0-4-4H4"></path>
                </svg>
              </button>

              <button class="btn-icon" type="button" id="forwardBtn" title="Encaminhar" aria-label="Encaminhar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="15 17 20 12 15 7"></polyline>
                  <path d="M4 18v-2a4 4 0 0 1 4-4h12"></path>
                </svg>
              </button>
            </div>
          </div>

          <article class="mail-view" id="mailView">
            <div class="mail-empty-state mail-empty-state--plain">
              <span>Selecione uma conversa</span>
            </div>
          </article>
        </div>
      </section>
    </div>
  </div>

  <div id="loadingOverlay" class="mail-loading-overlay" aria-hidden="true">
    <div class="mail-loading-box">
      <div class="mail-loading-spinner"></div>
      <div class="mail-loading-text" id="loadingText">Carregando...</div>
    </div>
  </div>

  <div id="mailFeedback" class="mail-feedback"></div>
  <div class="compose-overlay" id="composeOverlay"></div>

  <section class="compose-modal" id="composeModal" aria-hidden="true">
    <div class="compose-modal__head">
      <strong>Nova Mensagem</strong>

      <button type="button" class="btn-icon btn-icon--sm" id="closeComposeBtn" aria-label="Fechar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <form class="compose-form" id="composeForm">
      <div class="field field-hidden">
        <input type="text" id="from" value="" readonly />
      </div>

      <div class="field">
        <label for="to">Para</label>
        <input type="email" id="to" required />
      </div>

      <div class="field">
        <label for="subject">Assunto</label>
        <input type="text" id="subject" />
      </div>

      <div class="compose-tools">
        <button type="button" class="btn btn-secondary btn-xs" id="toggleSchedulePanelBtn">
          Programar envio
        </button>

        <div class="compose-schedule-panel" id="composeSchedulePanel" style="display:none;">
          <label for="scheduledFor">Enviar em</label>
          <input type="datetime-local" id="scheduledFor" />
          <button type="button" class="btn btn-secondary btn-xs" id="clearScheduledForBtn">
            Limpar
          </button>
        </div>
      </div>

      <div class="field compose-field--grow">
        <textarea id="message" placeholder="Escreva sua mensagem..."></textarea>
      </div>

      <div class="compose-actions">
        <div class="compose-actions__left">
          <button type="submit" class="btn btn-primary">Enviar</button>
          <button type="button" class="btn btn-secondary" id="scheduleSendBtn">Programar</button>
        </div>

        <button type="button" class="btn-icon" id="draftBtn" title="Salvar rascunho" aria-label="Salvar rascunho">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
            <polyline points="17 21 17 13 7 13 7 21"></polyline>
            <polyline points="7 3 7 8 15 8"></polyline>
          </svg>
        </button>
      </div>
    </form>
  </section>

  <script src="/assets/js/mail.js"></script>
</body>
</html>
